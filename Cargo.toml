[workspace]
resolver = "3"

members = ["module-01-intro", "module-02-routing"]

# Shared dependencies across all modules
[workspace.dependencies]
# Core Axum Framework
axum = "0.8.8"
axum-extra = { version = "0.10", features = [
    "typed-header",
    "query",
    "multipart",
] }

tokio = { version = "1.42", features = ["full"] }

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
